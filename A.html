<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drive Share Test</title>
<style>
  body { font-family: sans-serif; padding: 16px; background: #f0f4f8; }
  input, button { font-size: 16px; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
  button { background: #1976d2; color: white; border: none; border-radius: 6px; }
  pre { background: #fff; padding: 12px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; font-size: 13px; }
  .ok { color: #0a7a2f; }
  .err { color: #c62828; }
</style>
</head>
<body>
  <h3>Drive Share Debug</h3>
  <label>Google Drive File ID</label>
  <input id="fid" placeholder="paste the file ID here" />
  <label>API Key</label>
  <input id="key" value="AIzaSyDVMetx_iNp7Wq0cq8Cp2CRaqJxJdnCo2U" />
  <button onclick="run()">Test Fetch</button>
  <pre id="out">Result will show here. This page must be hosted at mahi902.github.io/DocuWritePro/ for the referrer restriction to allow it through.</pre>

<script>
async function run() {
  const id = document.getElementById('fid').value.trim();
  const key = document.getElementById('key').value.trim();
  const out = document.getElementById('out');
  out.className = '';
  out.textContent = 'Fetching\u2026\n\nURL: ' + location.href + '\n(this page\u2019s own URL is what gets sent as the referrer)';
  if (!id || !key) { out.textContent = 'Fill in both fields.'; return; }
  try {
    const url = `https://www.googleapis.com/drive/v3/files/${encodeURIComponent(id)}?alt=media&key=${encodeURIComponent(key)}`;
    const r = await fetch(url);
    const text = await r.text();
    if (r.ok) {
      out.className = 'ok';
      out.textContent = 'SUCCESS (' + r.status + ')\n\n' + text.slice(0, 1000);
    } else {
      out.className = 'err';
      out.textContent = 'FAILED (' + r.status + ')\n\n' + text.slice(0, 1000);
    }
  } catch (e) {
    out.className = 'err';
    out.textContent = 'FETCH THREW AN ERROR (likely CORS or network):\n\n' + e.message;
  }
}
</script>
</body>
</html>
