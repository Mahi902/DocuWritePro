<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Definitive Word</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --text:#1c1c1e; --text-sub:#6b6f76;
    --border:#e6e7eb; --accent:#1976d2; --accent-bg:#e8f1fc; --accent-text:#1565c0;
    --chip-bg:#eef1f5; --chip-text:#454a52; --shadow:0 2px 14px rgba(20,20,30,.06);
    --err:#d32f2f; --err-bg:#fdecea;
  }
  body.dark{
    --bg:#121212; --card:#1c1c1e; --text:#f0f0f0; --text-sub:#9a9ea5;
    --border:#2c2c2f; --accent:#64b5f6; --accent-bg:#173049; --accent-text:#90caf9;
    --chip-bg:#28282b; --chip-text:#c7cad0; --shadow:0 2px 18px rgba(0,0,0,.4);
    --err:#ef5350; --err-bg:#3a1f1f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Quicksand',system-ui,sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; transition:background .2s,color .2s;
  }
  .material-symbols-outlined{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;
    font-size:20px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;
    white-space:nowrap;word-wrap:normal;direction:ltr;vertical-align:middle;
    font-variation-settings:'FILL' 1;}

  header{
    position:sticky;top:0;z-index:10;
    display:flex;align-items:center;gap:8px;
    padding:12px 16px;background:var(--card);
    border-bottom:1px solid var(--border);
  }
  .icon-btn{
    background:none;border:none;cursor:pointer;color:var(--text-sub);
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s,color .15s;flex-shrink:0;
  }
  .icon-btn:hover{background:var(--chip-bg);color:var(--text);}
  header .brand{
    font-weight:700;font-size:15px;color:var(--text-sub);
    display:flex;align-items:center;gap:6px;flex:1;min-width:0;
  }
  header .brand b{color:var(--accent);}

  .wrap{max-width:640px;margin:0 auto;padding:18px 16px 60px;}

  .search-row{display:flex;gap:8px;margin-bottom:18px;}
  .search-row input{
    flex:1;min-width:0;font-family:inherit;font-size:15px;
    padding:11px 14px;border-radius:12px;border:1.5px solid var(--border);
    background:var(--card);color:var(--text);outline:none;
    transition:border-color .15s;
  }
  .search-row input:focus{border-color:var(--accent);}
  .search-row button{
    font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;
    background:var(--accent);color:#fff;border:none;border-radius:12px;
    padding:0 18px;display:flex;align-items:center;gap:6px;flex-shrink:0;
  }

  .card{
    background:var(--card);border-radius:16px;box-shadow:var(--shadow);
    padding:22px 22px 18px;border:1px solid var(--border);
  }

  .word-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .word-title{font-size:30px;font-weight:700;line-height:1.15;word-break:break-word;}
  .word-meta{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap;}
  .phonetic{color:var(--text-sub);font-size:15px;}
  .audio-btn{
    background:var(--accent-bg);color:var(--accent-text);border:none;border-radius:50%;
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;
  }
  .audio-btn:disabled{opacity:.4;cursor:default;}
  .audio-btn .material-symbols-outlined{font-size:18px;}

  .origin{margin-top:10px;font-size:13px;color:var(--text-sub);font-style:italic;line-height:1.5;}

  .meaning{margin-top:22px;padding-top:18px;border-top:1px solid var(--border);}
  .meaning:first-of-type{margin-top:20px;}
  .pos-chip{
    display:inline-block;font-size:12px;font-weight:700;letter-spacing:.3px;
    color:var(--accent-text);background:var(--accent-bg);
    padding:4px 11px;border-radius:20px;margin-bottom:12px;text-transform:lowercase;
  }
  .def-list{margin:0;padding:0;list-style:none;counter-reset:def;}
  .def-list li{
    counter-increment:def;position:relative;padding-left:26px;margin-bottom:12px;
    font-size:15px;line-height:1.55;
  }
  .def-list li::before{
    content:counter(def);position:absolute;left:0;top:1px;
    font-size:12px;font-weight:700;color:var(--accent);
  }
  .example{display:block;margin-top:4px;color:var(--text-sub);font-style:italic;font-size:14px;}
  .example::before{content:"“ ";}
  .example::after{content:" ”";}

  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .chip{
    background:var(--chip-bg);color:var(--chip-text);font-size:12.5px;font-weight:600;
    padding:4px 10px;border-radius:8px;cursor:pointer;border:none;font-family:inherit;
    transition:background .15s;
  }
  .chip:hover{background:var(--accent-bg);color:var(--accent-text);}
  .chip-label{font-size:11px;color:var(--text-sub);font-weight:700;text-transform:uppercase;
    letter-spacing:.4px;margin-top:12px;margin-bottom:2px;display:block;}

  .state{
    display:flex;flex-direction:column;align-items:center;text-align:center;
    padding:50px 20px;color:var(--text-sub);gap:14px;
  }
  .spinner{
    width:32px;height:32px;border-radius:50%;
    border:3px solid var(--border);border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .empty-state .material-symbols-outlined{font-size:52px;color:var(--border);}
  .error-state{
    background:var(--err-bg);border-radius:16px;padding:26px 20px;color:var(--err);
    display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;
  }
  .error-state .material-symbols-outlined{font-size:38px;}
  .error-state h3{margin:0;font-size:17px;}
  .error-state p{margin:0;font-size:13.5px;color:var(--text-sub);line-height:1.5;}
  .fallback-links{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
  .fallback-links a{
    font-size:13px;font-weight:600;color:var(--accent-text);background:var(--accent-bg);
    text-decoration:none;padding:8px 14px;border-radius:10px;display:flex;align-items:center;gap:5px;
  }

  footer{
    text-align:center;font-size:11.5px;color:var(--text-sub);
    padding:20px 16px 30px;
  }
  footer a{color:var(--text-sub);}

  @media(max-width:480px){
    .word-title{font-size:25px;}
    .card{padding:18px 16px 14px;}
  }
</style>
</head>
<body>

<header>
  <button class="icon-btn" onclick="goBack()" title="Back"><span class="material-symbols-outlined">arrow_back</span></button>
  <div class="brand"><span class="material-symbols-outlined" style="font-size:18px;">menu_book</span> Definitive <b>Word</b></div>
  <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme"><span class="material-symbols-outlined" id="themeIcon">dark_mode</span></button>
</header>

<div class="wrap">
  <div class="search-row">
    <input type="text" id="searchInp" placeholder="Look up a word…" autocomplete="off" spellcheck="false"/>
    <button onclick="searchFromInput()"><span class="material-symbols-outlined" style="font-size:17px;">search</span>Look up</button>
  </div>

  <div id="content"></div>
</div>

<footer>Definitions via <a href="https://dictionaryapi.dev" target="_blank" rel="noopener">Free Dictionary API</a> · part of DocuWrite Pro</footer>

<audio id="audioPlayer" style="display:none;"></audio>

<script>
let _theme = 'l';
let _word = '';

function parseHash() {
  let h = decodeURIComponent(location.hash || '').slice(1);
  if (!h) return { theme: null, word: '' };
  const first = h.charAt(0);
  if (first === 'l' || first === 'd') {
    return { theme: first, word: h.slice(1) };
  }
  return { theme: null, word: h };
}

function applyTheme(t) {
  _theme = t;
  document.body.classList.toggle('dark', t === 'd');
  const icon = document.getElementById('themeIcon');
  if (icon) icon.textContent = t === 'd' ? 'light_mode' : 'dark_mode';
}

function toggleTheme() {
  applyTheme(_theme === 'd' ? 'l' : 'd');
  setHash(_theme, _word, false);
}

function setHash(theme, word, push) {
  const h = '#' + theme + encodeURIComponent(word);
  if (push) location.hash = h;
  else history.replaceState(null, '', h);
}

function goBack() {
  if (history.length > 1) history.back();
  else window.close();
}

function searchFromInput() {
  const v = document.getElementById('searchInp').value.trim();
  if (!v) return;
  loadWord(v, true);
}

document.getElementById('searchInp').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchFromInput();
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showLoading(word) {
  document.getElementById('content').innerHTML = `
    <div class="state">
      <div class="spinner"></div>
      <div>Looking up “${esc(word)}”…</div>
    </div>`;
}

function showEmpty() {
  document.getElementById('content').innerHTML = `
    <div class="state empty-state">
      <span class="material-symbols-outlined">travel_explore</span>
      <div>Type a word above to see its definition here.</div>
    </div>`;
}

function showNotFound(word) {
  const q = encodeURIComponent(word);
  document.getElementById('content').innerHTML = `
    <div class="error-state">
      <span class="material-symbols-outlined">search_off</span>
      <h3>No definition found</h3>
      <p>“${esc(word)}” isn't in the dictionary we checked. It might be misspelled, very informal, or in another language.</p>
      <div class="fallback-links">
        <a href="https://en.wiktionary.org/wiki/${q}" target="_blank" rel="noopener"><span class="material-symbols-outlined" style="font-size:15px;">open_in_new</span>Try Wiktionary</a>
        <a href="https://www.google.com/search?q=define+${q}" target="_blank" rel="noopener"><span class="material-symbols-outlined" style="font-size:15px;">open_in_new</span>Try Google</a>
      </div>
    </div>`;
}

function showError(word, msg) {
  document.getElementById('content').innerHTML = `
    <div class="error-state">
      <span class="material-symbols-outlined">wifi_off</span>
      <h3>Couldn't load definition</h3>
      <p>${esc(msg || 'Something went wrong reaching the dictionary service.')}</p>
      <div class="fallback-links">
        <a href="javascript:void(0)" onclick="loadWord(${JSON.stringify(word)}, false)"><span class="material-symbols-outlined" style="font-size:15px;">refresh</span>Retry</a>
      </div>
    </div>`;
}

function playAudio(url) {
  if (!url) return;
  const a = document.getElementById('audioPlayer');
  a.src = url.startsWith('//') ? 'https:' + url : url;
  a.play().catch(()=>{});
}

function renderWord(word, data) {
  const entry = data[0];
  const phoneticText = entry.phonetic || (entry.phonetics.find(p => p.text) || {}).text || '';
  const audioUrl = (entry.phonetics.find(p => p.audio) || {}).audio || '';
  const origin = entry.origin || '';

  let meaningsHtml = '';
  entry.meanings.forEach(m => {
    const defsHtml = m.definitions.map(d => `
      <li>
        ${esc(d.definition)}
        ${d.example ? `<span class="example">${esc(d.example)}</span>` : ''}
      </li>`).join('');

    const allSyn = new Set(m.synonyms || []);
    m.definitions.forEach(d => (d.synonyms || []).forEach(s => allSyn.add(s)));
    const synChips = [...allSyn].slice(0, 10).map(s =>
      `<button class="chip" onclick="loadWord(${JSON.stringify(s)}, true)">${esc(s)}</button>`).join('');

    meaningsHtml += `
      <div class="meaning">
        <span class="pos-chip">${esc(m.partOfSpeech)}</span>
        <ol class="def-list">${defsHtml}</ol>
        ${synChips ? `<span class="chip-label">Synonyms</span><div class="chips">${synChips}</div>` : ''}
      </div>`;
  });

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="word-head">
        <div>
          <div class="word-title">${esc(entry.word)}</div>
          <div class="word-meta">
            ${phoneticText ? `<span class="phonetic">${esc(phoneticText)}</span>` : ''}
            <button class="audio-btn" ${audioUrl ? '' : 'disabled'} onclick="playAudio(${JSON.stringify(audioUrl)})" title="Play pronunciation">
              <span class="material-symbols-outlined">volume_up</span>
            </button>
          </div>
        </div>
      </div>
      ${origin ? `<div class="origin">${esc(origin)}</div>` : ''}
      ${meaningsHtml}
    </div>`;
}

async function loadWord(word, push) {
  word = (word || '').trim();
  if (!word) { showEmpty(); return; }
  _word = word;
  document.getElementById('searchInp').value = word;
  setHash(_theme, word, push);
  showLoading(word);

  try {
    const resp = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word));
    if (resp.status === 404) { showNotFound(word); return; }
    if (!resp.ok) { showError(word, 'Dictionary service returned an error (HTTP ' + resp.status + ').'); return; }
    const data = await resp.json();
    if (!Array.isArray(data) || !data.length) { showNotFound(word); return; }
    renderWord(word, data);
  } catch (e) {
    showError(word, 'Network error — check your internet connection.');
  }
}

// ── Init ─────────────────────────────────────────────────────────────
(function init() {
  const parsed = parseHash();
  const theme = parsed.theme || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'd' : 'l');
  applyTheme(theme);
  if (parsed.word) loadWord(parsed.word, false);
  else showEmpty();
})();

window.addEventListener('hashchange', () => {
  const parsed = parseHash();
  if (parsed.theme && parsed.theme !== _theme) applyTheme(parsed.theme);
  if (parsed.word && parsed.word !== _word) loadWord(parsed.word, false);
});
</script>
</body>
</html>
