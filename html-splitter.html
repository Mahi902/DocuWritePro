<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Splitter | Developer Utility</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f2f2f2;
            --border: #e0e0e0;
            --text: #121212;
            --text-sub: #666666;
            --accent: #000000;
            --accent-text: #ffffff;
            --radius: 10px;
            --font-code: 'Fira Code', monospace;
        }

        .dark {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --text: #ffffff;
            --text-sub: #888888;
            --accent: #ffffff;
            --accent-text: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            transition: background 0.2s, color 0.2s;
            line-height: 1.5;
        }

        .app-container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }
        .file-info-badge { 
            font-size: 11px; 
            background: var(--surface); 
            padding: 4px 8px; 
            border-radius: 4px; 
            border: 1px solid var(--border);
            font-family: var(--font-code);
            color: var(--text-sub);
        }

        /* Layout */
        .grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            position: relative;
        }

        /* Editor Area */
        .editor-wrapper { position: relative; width: 100%; }
        textarea {
            width: 100%;
            height: 400px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            color: var(--text);
            font-family: var(--font-code);
            font-size: 13px;
            outline: none;
            resize: none;
        }

        /* Controls */
        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-area:hover { border-color: var(--text-sub); }

        .input-group { margin-bottom: 15px; }
        input, select {
            width: 100%;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--font-code);
            font-size: 14px;
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Results */
        .chunk-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 15px;
            overflow: hidden;
        }
        .chunk-header {
            padding: 8px 15px;
            background: rgba(128,128,128,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .btn-icon {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .chunk-body { padding: 15px; font-family: var(--font-code); font-size: 12px; white-space: pre; overflow-x: auto; }

        .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-size: 18px; }
        
        .hidden { display: none; }
    </style>
</head>
<body class="dark">

<div class="app-container">
    <header>
        <div class="brand">
            <span class="material-symbols-rounded">terminal</span>
            Code Splitter
            <span id="extensionBadge" class="file-info-badge">.txt</span>
        </div>
        <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">
            <span class="material-symbols-rounded">light_mode</span>
        </button>
    </header>

    <div class="grid">
        <div class="card">
            <div class="section-label">
                <span class="material-symbols-rounded">code</span> Source Content
            </div>
            <div class="editor-wrapper">
                <textarea id="editor" placeholder="Paste code here or drag and drop a file..."></textarea>
            </div>
        </div>

        <aside>
            <div class="card">
                <div class="section-label">Import File</div>
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <span class="material-symbols-rounded">upload_file</span>
                    <p style="font-size: 12px; margin-top: 5px;">Supports .js, .py, .html, .css, etc.</p>
                </div>
                <input type="file" id="fileInput" class="hidden" onchange="handleFileUpload(this)">

                <div class="section-label">Split Configuration</div>
                <div class="input-group">
                    <select id="splitMode" onchange="updateUI()">
                        <option value="lines">Lines of Code</option>
                        <option value="chars">Character Count</option>
                        <option value="regex">Regex Separator</option>
                    </select>
                </div>
                <div class="input-group">
                    <input type="text" id="splitVal" value="50" placeholder="Number or Pattern">
                </div>

                <div class="section-label">Download Format</div>
                <div class="input-group">
                    <select id="dlFormat">
                        <option value="original">Original Extension</option>
                        <option value="txt">Plain Text (.txt)</option>
                    </select>
                </div>

                <button class="btn-main" onclick="splitCode()">
                    <span class="material-symbols-rounded">splitscreen</span>
                    Split Codebase
                </button>
            </div>
        </aside>
    </div>

    <div id="resultContainer">
        </div>
</div>

<script>
    let originalExtension = 'txt';
    let segments = [];

    function toggleTheme() {
        document.body.classList.toggle('dark');
        const icon = document.querySelector('#themeBtn span');
        icon.textContent = document.body.classList.contains('dark') ? 'light_mode' : 'dark_mode';
    }

    function handleFileUpload(input) {
        const file = input.files[0];
        if (!file) return;
        
        const nameParts = file.name.split('.');
        originalExtension = nameParts.length > 1 ? nameParts.pop() : 'txt';
        document.getElementById('extensionBadge').textContent = `.${originalExtension}`;

        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('editor').value = e.target.result;
        };
        reader.readAsText(file);
    }

    function splitCode() {
        const content = document.getElementById('editor').value;
        if (!content) return;

        const mode = document.getElementById('splitMode').value;
        const val = document.getElementById('splitVal').value;
        segments = [];

        if (mode === 'lines') {
            const lines = content.split('\n');
            const n = parseInt(val) || 50;
            for (let i = 0; i < lines.length; i += n) {
                segments.push(lines.slice(i, i + n).join('\n'));
            }
        } else if (mode === 'chars') {
            const n = parseInt(val) || 1000;
            for (let i = 0; i < content.length; i += n) {
                segments.push(content.substring(i, i + n));
            }
        } else if (mode === 'regex') {
            segments = content.split(new RegExp(val, 'g'));
        }

        renderSegments();
    }

    function renderSegments() {
        const container = document.getElementById('resultContainer');
        container.innerHTML = `<div class="section-label" style="margin-top:40px;">Generated Segments (${segments.length})</div>`;
        
        segments.forEach((seg, i) => {
            const div = document.createElement('div');
            div.className = 'chunk-card';
            div.innerHTML = `
                <div class="chunk-header">
                    <span style="font-family: var(--font-code); font-size: 11px;">SEGMENT_${i+1}</span>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-icon" onclick="copySeg(${i}, this)" title="Copy">
                            <span class="material-symbols-rounded">content_copy</span>
                        </button>
                        <button class="btn-icon" onclick="downloadSeg(${i})" title="Download">
                            <span class="material-symbols-rounded">download</span>
                        </button>
                    </div>
                </div>
                <div class="chunk-body">${escape(seg)}</div>
            `;
            container.appendChild(div);
        });
    }

    function downloadSeg(i) {
        const format = document.getElementById('dlFormat').value;
        const ext = format === 'original' ? originalExtension : 'txt';
        const blob = new Blob([segments[i]], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `segment_${i+1}.${ext}`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function copySeg(i, btn) {
        navigator.clipboard.writeText(segments[i]);
        const icon = btn.querySelector('span');
        icon.textContent = 'check';
        setTimeout(() => icon.textContent = 'content_copy', 1500);
    }

    function escape(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function updateUI() {
        const mode = document.getElementById('splitMode').value;
        const input = document.getElementById('splitVal');
        if (mode === 'lines') input.value = "50";
        if (mode === 'chars') input.value = "1000";
        if (mode === 'regex') input.value = "\\n\\n";
    }

    // Drag & Drop support
    const editor = document.getElementById('editor');
    editor.addEventListener('dragover', (e) => { e.preventDefault(); editor.style.borderColor = "var(--text)"; });
    editor.addEventListener('dragleave', () => { editor.style.borderColor = "var(--border)"; });
    editor.addEventListener('drop', (e) => {
        e.preventDefault();
        editor.style.borderColor = "var(--border)";
        const file = e.dataTransfer.files[0];
        if (file) {
            const inputMock = { files: [file] };
            handleFileUpload(inputMock);
        }
    });
</script>

</body>
</html>
