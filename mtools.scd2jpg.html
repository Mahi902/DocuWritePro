<!DOCTYPE html>
<html>
<head>
    <title>scd2jpg</title>
    <style>
        body, html, iframe { margin: 0; padding: 0; width: 100%; height: 100%; border: none; overflow: hidden; }
    </style>
</head>
<body>
    <iframe id="mainFrame"></iframe>
    <script>
        const frame = document.getElementById('mainFrame');
        
        function sync() {
            const h = window.location.hash;
            if (h === "#light") {
                document.body.style.backgroundColor = "#ffffff";
                frame.src = "https://mahi902.github.io/DocuWritePro/sceditor.html#scd2jpgl";
            } else if (h === "#dark") {
                document.body.style.backgroundColor = "#000000";
                frame.src = "https://mahi902.github.io/DocuWritePro/sceditor.html#scd2jpgd";
            }
        }

        window.addEventListener('load', sync);
        window.addEventListener('hashchange', sync);

        setInterval(() => {
            try {
                const fHash = frame.contentWindow.location.hash;
                if (fHash.endsWith('l') && window.location.hash !== '#light') {
                    window.location.hash = '#light';
                } else if (fHash.endsWith('d') && window.location.hash !== '#dark') {
                    window.location.hash = '#dark';
                }
            } catch (e) {}
        }, 500);
    </script>
</body>
</html>
