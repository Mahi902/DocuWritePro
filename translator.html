<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translator · DocuWrite Pro</title>

  <!-- === REQUIRED CDNs === -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- === EARLY THEME SCRIPT (prevent flash) === -->
  <script>
    (function() {
      const match = document.cookie.split('; ').find(row => row.startsWith('toolsuite_theme='));
      if (match && match.split('=')[1] === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <style>
    /* ---------- GLOBAL RESET & HIDDEN SCROLLBARS ---------- */
    * { scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      overflow: hidden;
      height: 100vh;
    }
    body.dark { background: #111; }

    /* ---------- LAYOUT VARIABLES (light/dark) ---------- */
    body {
      --bg-canvas: #f0f4f8;
      --bg-surface: #ffffff;
      --bg-surface-2: #fafafa;
      --bg-modal: #ffffff;
      --bg-hover: #e3f2fd;
      --bg-active: #bbdefb;
      --bg-tip: #1976d2;
      --text-primary: #333333;
      --text-secondary: #777777;
      --text-muted: #999999;
      --text-accent: #1976d2;
      --text-heading: #1a1a2e;
      --text-on-accent: #ffffff;
      --text-danger: #d32f2f;
      --accent: #1976d2;
      --accent-hover: #1565c0;
      --accent-light: #e3f2fd;
      --accent-medium: #bbdefb;
      --accent-secondary: #546e7a;
      --border: #e0e0e0;
      --border-light: #f0f0f0;
      --border-input: #e0e0e0;
      --border-focused: #1976d2;
      --shadow-bar: 0 2px 8px rgba(0,0,0,0.1);
      --shadow-toolbar: 0 2px 4px rgba(0,0,0,0.06);
      --shadow-sidebar: 2px 0 8px rgba(0,0,0,0.06);
      --shadow-modal: 0 16px 48px rgba(0,0,0,0.25);
      --shadow-menu: 0 4px 20px rgba(0,0,0,0.18);
    }
    body.dark {
      --bg-canvas: #111111;
      --bg-surface: #1a1a1a;
      --bg-surface-2: #252525;
      --bg-modal: #1e1e1e;
      --bg-hover: #1a2a3a;
      --bg-active: #0d2a4a;
      --bg-tip: #0d47a1;
      --text-primary: #dddddd;
      --text-secondary: #aaaaaa;
      --text-muted: #666666;
      --text-accent: #90caf9;
      --text-heading: #e0e0e0;
      --text-on-accent: #ffffff;
      --text-danger: #ef9a9a;
      --accent: #1976d2;
      --accent-hover: #1565c0;
      --accent-light: #1a2a3a;
      --accent-medium: #0d2a4a;
      --accent-secondary: #546e7a;
      --border: #333333;
      --border-light: #2a2a2a;
      --border-input: #444444;
      --border-focused: #1976d2;
      --shadow-bar: 0 2px 8px rgba(0,0,0,0.5);
      --shadow-toolbar: 0 2px 4px rgba(0,0,0,0.3);
      --shadow-sidebar: 2px 0 8px rgba(0,0,0,0.3);
      --shadow-modal: 0 16px 48px rgba(0,0,0,0.5);
      --shadow-menu: 0 4px 20px rgba(0,0,0,0.5);
    }

    /* ---------- TYPOGRAPHY & UTILITY ---------- */
    .sb-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-secondary);
      margin-bottom: 9px;
    }
    .sb-label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 3px;
    }

    /* ---------- LAYOUT STRUCTURE ---------- */
    #loadingScreen {
      display: flex;
      position: fixed;
      inset: 0;
      background: var(--bg-surface);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid var(--accent-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 17px; color: var(--text-secondary); }

    #appContainer {
      display: none;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* top bar */
    .top-bar {
      background: var(--bg-surface);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-bar);
      z-index: 200;
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
    }
    #toolTitle {
      font-size: 17px;
      border: none;
      outline: none;
      padding: 6px 10px;
      border-radius: 8px;
      font-family: inherit;
      min-width: 140px;
      max-width: 340px;
      background: transparent;
      color: var(--text-heading);
      flex-shrink: 0;
    }
    #toolTitle:hover, #toolTitle:focus { background: var(--bg-surface-2); }
    .top-spacer { flex: 1; min-width: 8px; }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 7px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      color: var(--accent);
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--accent-light); }
    .icon-btn .material-symbols-outlined { font-size: 22px; color: var(--text-primary); }

    /* toolbar */
    .toolbar {
      background: var(--bg-surface);
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 3px;
      box-shadow: var(--shadow-toolbar);
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
    }
    .tbtn {
      background: transparent;
      border: none;
      border-radius: 6px;
      padding: 6px 7px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .tbtn:hover { background: var(--accent-light); }
    .tbtn.active { background: var(--accent-medium); }
    .tbtn .material-symbols-outlined { font-size: 19px; color: var(--text-primary); }
    .toolbar-sep {
      width: 1px;
      height: 26px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* main content row */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* sidebar */
    .sidebar {
      width: 255px;
      min-width: 255px;
      background: var(--bg-surface);
      padding: 14px;
      overflow-y: auto;
      box-shadow: var(--shadow-sidebar);
      transition: transform 0.3s, width 0.3s, min-width 0.3s, padding 0.3s;
      flex-shrink: 0;
    }
    .sidebar.collapsed {
      transform: translateX(-255px);
      width: 0;
      min-width: 0;
      padding: 0;
      overflow: hidden;
    }
    .sb-section { margin-bottom: 18px; }
    .sb-input, select.sb-input {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid var(--border-input);
      border-radius: 8px;
      font-size: 13px;
      background: var(--bg-surface-2);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color: var(--text-primary);
    }
    .sb-input:focus, select.sb-input:focus {
      border-color: var(--border-focused);
      box-shadow: 0 0 0 3px rgba(25,118,210,0.1);
      background: var(--bg-surface);
    }
    .collapse-btn {
      width: 100%;
      padding: 8px;
      background: var(--accent-light);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
      margin-top: 6px;
      transition: background 0.15s;
      font-family: inherit;
    }
    .collapse-btn:hover { background: var(--accent-medium); }

    /* expand button (floating) */
    .expand-btn {
      position: fixed;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--bg-surface);
      border: none;
      border-radius: 8px;
      padding: 10px 5px;
      cursor: pointer;
      box-shadow: var(--shadow-menu);
      z-index: 50;
      display: none;
      color: var(--accent);
    }

    /* content area */
    .content-area {
      flex: 1;
      overflow: auto;
      display: flex;
      justify-content: center;
      background: var(--bg-canvas);
      min-width: 0;
      padding: 36px 20px;
    }
    /* translator card */
    .trans-panel {
      background: var(--bg-surface);
      border-radius: 18px;
      padding: 28px 30px;
      max-width: 800px;
      width: 100%;
      box-shadow: var(--shadow-modal);
      align-self: flex-start;
    }
    .textarea-wrapper {
      margin-bottom: 20px;
    }
    .textarea-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .textarea-header .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .char-counter {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 8px;
    }
    .textarea-actions {
      display: flex;
      gap: 4px;
    }
    .icon-btn.small {
      padding: 4px;
      border-radius: 6px;
    }
    .icon-btn.small .material-symbols-outlined {
      font-size: 18px;
    }
    .trans-textarea {
      width: 100%;
      min-height: 140px;
      padding: 12px 16px;
      border: 1px solid var(--border-input);
      border-radius: 12px;
      font-size: 16px;
      line-height: 1.5;
      font-family: inherit;
      background: var(--bg-surface-2);
      color: var(--text-primary);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    .trans-textarea:focus {
      border-color: var(--border-focused);
    }
    .trans-textarea[readonly] {
      background: var(--bg-surface-2);
      opacity: 0.9;
    }
    .action-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(25,118,210,0.3);
    }
    .action-btn:hover { background: var(--accent-hover); }
    .action-btn .material-symbols-outlined { font-size: 18px; }

    /* toast stack */
    #toastStack { position: fixed; bottom: 28px; left: 0; right: 0; pointer-events: none; z-index: 10002; }
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      padding: 11px 20px;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      z-index: 10002;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { background: var(--accent); }
    .toast.error { background: #d32f2f; }
    .toast.info { background: var(--accent); }

    /* tip box */
    #tipBox {
      position: fixed;
      bottom: 80px;
      right: 18px;
      width: 284px;
      background: var(--bg-tip);
      color: #fff;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(25,118,210,0.3);
      z-index: 9990;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
      font-family: inherit;
      pointer-events: none;
    }
    #tipBox.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #tipBox.hide { opacity: 0; transform: translateY(8px); pointer-events: none; }
    .tip-prog { height: 3px; background: rgba(255,255,255,0.2); border-radius: 99px; overflow: hidden; margin-bottom: 11px; }
    .tip-bar { height: 100%; background: #fff; transition: width 0.3s; }
    .tip-text { font-size: 13px; line-height: 1.5; min-height: 58px; }
    .tip-actions { display: flex; gap: 7px; margin-top: 11px; }
    .tip-btn {
      flex: 1; border: none; padding: 6px; border-radius: 7px; font-size: 12px;
      font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .tip-prev { background: rgba(255,255,255,0.15); color: #fff; }
    .tip-next { background: #fff; color: #1976d2; }

    /* dark mode overrides (applied via body.dark) */
    body.dark .icon-btn .material-symbols-outlined { color: var(--text-primary); }
    body.dark .tbtn .material-symbols-outlined { color: var(--text-primary); }
    body.dark .sb-input, body.dark select.sb-input { background: #252525; color: #ddd; border-color: #444; }
    body.dark .collapse-btn { background: #1a2a4a; color: #90caf9; }
    body.dark .expand-btn { background: #1a1a1a; }
    body.dark .trans-panel { background: #1a1a1a; }
    body.dark .trans-textarea { background: #252525; color: #ddd; }
  </style>
</head>
<body>
  <!-- LOADING SCREEN -->
  <div id="loadingScreen">
    <div class="spinner"></div>
    <div class="loading-text">Loading Translator...</div>
  </div>

  <!-- MAIN APP CONTAINER -->
  <div id="appContainer">
    <!-- TOP BAR -->
    <div class="top-bar">
      <input type="text" id="toolTitle" value="Language Translator" readonly>
      <div class="top-spacer"></div>
      <button class="icon-btn" id="themeToggle" onclick="toggleDarkMode()" title="Toggle dark mode">
        <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
      </button>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <button class="tbtn" id="swapLangBtn" title="Swap languages (source/target)">
        <span class="material-symbols-outlined">swap_horiz</span>
      </button>
      <span class="toolbar-sep"></span>
      <button class="tbtn" id="clearBtn" title="Clear text">
        <span class="material-symbols-outlined">delete</span>
      </button>
    </div>

    <!-- MAIN CONTENT (sidebar + workspace) -->
    <div class="main-content">
      <!-- SIDEBAR (language selection) -->
      <div class="sidebar" id="mainSidebar">
        <div class="sb-section">
          <div class="sb-title">Source language</div>
          <select class="sb-input" id="sourceLang"></select>
        </div>
        <div class="sb-section">
          <div class="sb-title">Target language</div>
          <select class="sb-input" id="targetLang"></select>
        </div>
        <button class="collapse-btn" onclick="toggleSidebar()">
          <span class="material-symbols-outlined">chevron_left</span>
          Hide Panel
        </button>
      </div>

      <!-- CONTENT AREA (translation card) -->
      <div class="content-area">
        <div class="trans-panel">
          <!-- source text -->
          <div class="textarea-wrapper">
            <div class="textarea-header">
              <span class="label">Source <span class="char-counter" id="srcCharCounter">500/500</span></span>
              <div class="textarea-actions">
                <button class="icon-btn small" id="srcCopy" title="Copy source">
                  <span class="material-symbols-outlined">content_copy</span>
                </button>
                <button class="icon-btn small" id="srcSpeak" title="Listen source">
                  <span class="material-symbols-outlined">volume_up</span>
                </button>
              </div>
            </div>
            <textarea class="trans-textarea" id="srcText" placeholder="Enter text to translate" maxlength="500"></textarea>
          </div>

          <!-- target text -->
          <div class="textarea-wrapper">
            <div class="textarea-header">
              <span class="label">Translation</span>
              <div class="textarea-actions">
                <button class="icon-btn small" id="tgtCopy" title="Copy translation">
                  <span class="material-symbols-outlined">content_copy</span>
                </button>
                <button class="icon-btn small" id="tgtSpeak" title="Listen translation">
                  <span class="material-symbols-outlined">volume_up</span>
                </button>
              </div>
            </div>
            <textarea class="trans-textarea" id="tgtText" placeholder="Translation" readonly></textarea>
          </div>

          <!-- translate button -->
          <div style="display: flex; justify-content: center;">
            <button class="action-btn" id="translateBtn">
              <span class="material-symbols-outlined">g_translate</span>
              Translate
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- floating expand button for sidebar -->
    <button class="expand-btn" id="expandBtn" onclick="toggleSidebar()" title="Show panel">
      <span class="material-symbols-outlined" style="color:#1976d2;">chevron_right</span>
    </button>

    <!-- TIP BOX (new user, no emojis) -->
    <div id="tipBox" class="hide">
      <div class="tip-prog"><div class="tip-bar" id="tipBar" style="width:0%"></div></div>
      <div class="tip-text" id="tipText">Welcome! Let's translate.</div>
      <div class="tip-actions">
        <button class="tip-btn tip-prev" onclick="tipNav(-1)">← Prev</button>
        <button class="tip-btn tip-next" onclick="tipNav(1)">Next →</button>
      </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toastStack"></div>
  </div>

  <script>
    (function() {
      // ---------- LANGUAGE DATA ----------
      const countries = {
        "am-ET": "Amharic", "ar-SA": "Arabic", "be-BY": "Bielarus", "bem-ZM": "Bemba",
        "bi-VU": "Bislama", "bjs-BB": "Bajan", "bn-IN": "Bengali", "bo-CN": "Tibetan",
        "br-FR": "Breton", "bs-BA": "Bosnian", "ca-ES": "Catalan", "cop-EG": "Coptic",
        "cs-CZ": "Czech", "cy-GB": "Welsh", "da-DK": "Danish", "dz-BT": "Dzongkha",
        "de-DE": "German", "dv-MV": "Maldivian", "el-GR": "Greek", "en-GB": "English",
        "es-ES": "Spanish", "et-EE": "Estonian", "eu-ES": "Basque", "fa-IR": "Persian",
        "fi-FI": "Finnish", "fn-FNG": "Fanagalo", "fo-FO": "Faroese", "fr-FR": "French",
        "gl-ES": "Galician", "gu-IN": "Gujarati", "ha-NE": "Hausa", "he-IL": "Hebrew",
        "hi-IN": "Hindi", "hr-HR": "Croatian", "hu-HU": "Hungarian", "id-ID": "Indonesian",
        "is-IS": "Icelandic", "it-IT": "Italian", "ja-JP": "Japanese", "kk-KZ": "Kazakh",
        "km-KM": "Khmer", "kn-IN": "Kannada", "ko-KR": "Korean", "ku-TR": "Kurdish",
        "ky-KG": "Kyrgyz", "la-VA": "Latin", "lo-LA": "Lao", "lv-LV": "Latvian",
        "men-SL": "Mende", "mg-MG": "Malagasy", "mi-NZ": "Maori", "ms-MY": "Malay",
        "mt-MT": "Maltese", "my-MM": "Burmese", "ne-NP": "Nepali", "niu-NU": "Niuean",
        "nl-NL": "Dutch", "no-NO": "Norwegian", "ny-MW": "Nyanja", "ur-PK": "Pakistani",
        "pau-PW": "Palauan", "pa-IN": "Panjabi", "ps-PK": "Pashto", "pis-SB": "Pijin",
        "pl-PL": "Polish", "pt-PT": "Portuguese", "rn-BI": "Kirundi", "ro-RO": "Romanian",
        "ru-RU": "Russian", "sg-CF": "Sango", "si-LK": "Sinhala", "sk-SK": "Slovak",
        "sm-WS": "Samoan", "sn-ZW": "Shona", "so-SO": "Somali", "sq-AL": "Albanian",
        "sr-RS": "Serbian", "sv-SE": "Swedish", "sw-SZ": "Swahili", "ta-LK": "Tamil",
        "te-IN": "Telugu", "tet-TL": "Tetum", "tg-TJ": "Tajik", "th-TH": "Thai",
        "ti-TI": "Tigrinya", "tk-TM": "Turkmen", "tl-PH": "Tagalog", "tn-BW": "Tswana",
        "to-TO": "Tongan", "tr-TR": "Turkish", "uk-UA": "Ukrainian", "uz-UZ": "Uzbek",
        "vi-VN": "Vietnamese", "wo-SN": "Wolof", "xh-ZA": "Xhosa", "yi-YD": "Yiddish",
        "zu-ZA": "Zulu"
      };

      // DOM elements
      const srcSelect = document.getElementById('sourceLang');
      const tgtSelect = document.getElementById('targetLang');
      const srcText = document.getElementById('srcText');
      const tgtText = document.getElementById('tgtText');
      const translateBtn = document.getElementById('translateBtn');
      const swapBtn = document.getElementById('swapLangBtn');
      const clearBtn = document.getElementById('clearBtn');
      const srcCopy = document.getElementById('srcCopy');
      const tgtCopy = document.getElementById('tgtCopy');
      const srcSpeak = document.getElementById('srcSpeak');
      const tgtSpeak = document.getElementById('tgtSpeak');
      const srcCharCounter = document.getElementById('srcCharCounter');

      // populate selects
      for (let code in countries) {
        let option1 = document.createElement('option');
        option1.value = code;
        option1.textContent = countries[code];
        if (code === 'en-GB') option1.selected = true;
        srcSelect.appendChild(option1);

        let option2 = document.createElement('option');
        option2.value = code;
        option2.textContent = countries[code];
        if (code === 'es-ES') option2.selected = true;
        tgtSelect.appendChild(option2);
      }

      // --- live char counter (max 500) ---
      function updateCharCounter() {
        let len = srcText.value.length;
        srcCharCounter.textContent = `${500 - len}/500`;
      }
      srcText.addEventListener('input', updateCharCounter);
      updateCharCounter(); // initial

      // --- toast helper ---
      function showToast(message, type = 'info', duration = 2800) {
        const stack = document.getElementById('toastStack');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span class="material-symbols-outlined" style="font-size:16px">${type==='error'?'error':'check_circle'}</span>${message}`;
        stack.appendChild(toast);
        requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => toast.remove(), 350);
        }, duration);
      }
      window.showToast = showToast; // expose for tips

      // --- track source empty state for toast on delete ---
      let wasSrcEmpty = srcText.value.length === 0;
      srcText.addEventListener('input', function() {
        let isEmpty = this.value.length === 0;
        if (!wasSrcEmpty && isEmpty) {
          showToast('Text cleared', 'info');
        }
        wasSrcEmpty = isEmpty;
      });

      // --- language change toast ---
      srcSelect.addEventListener('change', function() {
        showToast('Source language changed', 'success');
      });
      tgtSelect.addEventListener('change', function() {
        showToast('Target language changed', 'success');
      });

      // --- translate button ---
      translateBtn.addEventListener('click', () => {
        let text = srcText.value.trim();
        if (!text) { showToast('Enter text to translate', 'info'); return; }
        let from = srcSelect.value;
        let to = tgtSelect.value;
        tgtText.setAttribute('placeholder', 'Translating...');
        fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`)
          .then(res => res.json())
          .then(data => {
            let translated = data.responseData?.translatedText || '';
            if (!translated && data.matches && data.matches[0]) {
              translated = data.matches[0].translation;
            }
            tgtText.value = translated;
            tgtText.setAttribute('placeholder', 'Translation');
            if (!translated) showToast('No translation returned', 'info');
            else showToast('Translation ready', 'success');
          })
          .catch(() => {
            tgtText.value = '';
            tgtText.setAttribute('placeholder', 'Translation failed');
            showToast('Translation failed', 'error');
          });
      });

      // --- swap languages and text ---
      swapBtn.addEventListener('click', () => {
        let tempLang = srcSelect.value;
        srcSelect.value = tgtSelect.value;
        tgtSelect.value = tempLang;
        let tempTxt = srcText.value;
        srcText.value = tgtText.value;
        tgtText.value = tempTxt;
        updateCharCounter();
        showToast('Languages swapped', 'success');
      });

      // --- clear button ---
      clearBtn.addEventListener('click', () => {
        srcText.value = '';
        tgtText.value = '';
        updateCharCounter();
        showToast('All text cleared', 'info');
      });

      // --- copy & speech ---
      function copyText(text) {
        if (!text) { showToast('Nothing to copy', 'info'); return; }
        navigator.clipboard?.writeText(text).then(() => showToast('Copied!', 'success')).catch(() => {
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          showToast('Copied!', 'success');
        });
      }
      srcCopy.addEventListener('click', () => copyText(srcText.value));
      tgtCopy.addEventListener('click', () => copyText(tgtText.value));

      function speak(text, lang) {
        if (!text) { showToast('No text to speak', 'info'); return; }
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        speechSynthesis.speak(utterance);
      }
      srcSpeak.addEventListener('click', () => speak(srcText.value, srcSelect.value));
      tgtSpeak.addEventListener('click', () => speak(tgtText.value, tgtSelect.value));

      // ---------- SIDEBAR COLLAPSE ----------
      window.toggleSidebar = function() {
        const sidebar = document.getElementById('mainSidebar');
        const expandBtn = document.getElementById('expandBtn');
        const isCollapsed = sidebar.classList.contains('collapsed');
        sidebar.classList.toggle('collapsed');
        expandBtn.style.display = isCollapsed ? 'none' : 'block';
      };

      // ---------- DARK MODE (cookie) ----------
      window.toggleDarkMode = function() {
        const isDark = document.body.classList.toggle('dark');
        const icon = document.getElementById('themeIcon');
        icon.textContent = isDark ? 'light_mode' : 'dark_mode';
        setThemeCookie(isDark ? 'dark' : 'light');
      };
      function setThemeCookie(value) {
        document.cookie = 'toolsuite_theme=' + value + '; path=/; max-age=31536000; SameSite=Lax';
      }
      if (document.documentElement.classList.contains('dark')) {
        document.body.classList.add('dark');
        document.getElementById('themeIcon').textContent = 'light_mode';
      }

      // ---------- TIP BOX (no emojis) ----------
      const TIPS = [
        "Select source/target languages in the left sidebar.",
        "Use the swap button in toolbar to exchange languages.",
        "Copy translation with the copy icon near each text box.",
        "Click the speaker to hear the text (speech synthesis).",
        "Toggle dark mode using the top bar icon."
      ];
      let tipIndex = 0;
      function showTip(index) {
        const box = document.getElementById('tipBox');
        const text = document.getElementById('tipText');
        const bar = document.getElementById('tipBar');
        text.textContent = TIPS[index];
        bar.style.width = ((index + 1) / TIPS.length * 100) + '%';
        box.classList.remove('hide');
        box.classList.add('show');
      }
      window.tipNav = function(dir) {
        tipIndex = Math.max(0, Math.min(TIPS.length - 1, tipIndex + dir));
        if (tipIndex === TIPS.length - 1 && dir === 1) {
          dismissTips();
        } else {
          showTip(tipIndex);
        }
      };
      function dismissTips() {
        document.getElementById('tipBox').classList.replace('show', 'hide');
        localStorage.setItem('tips_seen', '1');
      }
      if (!localStorage.getItem('tips_seen')) {
        setTimeout(() => showTip(0), 1200);
      }

      // ---------- HIDE LOADING SCREEN ----------
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('appContainer').style.display = 'flex';
    })();
  </script>
</body>
</html>
